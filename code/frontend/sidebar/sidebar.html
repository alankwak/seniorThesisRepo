<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar</title>
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="components/selectableTable.js" type="module"></script>
  <script src="components/nonselectableTable.js" type="module"></script>
  <script src="components/sessionHandler.js" type="module"></script>
  <script src="components/userInteractionPanel.js" type="module"></script>
</head>
<body>

  <section>
    <session-handler></session-handler>
  </section>

  <h2 style="text-align: center;">Shared Tabs</h2>
  <section class="shared-tabs">
    <div class="user-section">
      <div class="user-header">
        <div class="user-label">You ( 
          <span id="nickname-display"></span>
          <input id="nickname-input" hidden>

          <button class="fa fa-edit edit-nickname-button" id="edit-nickname"></button>
          <button class="fa fa-save edit-nickname-button" id="save-nickname" style="display: none"></button>
          ):
        </div>
      </div>

      <div class="table-section">
        <non-selectable-table id="localTabs"></non-selectable-table>
        <div style="display: flex; justify-content: flex-end;">
          <button class="min-button" style="color: #1d4f2c;">+</button>
        </div>
        <selectable-table id="tabSelection"></selectable-table>
      </div>

      <div class="controls">
        <button id="startGroup" class="primary" style="display:none"> Share More Tabs</button>
      </div>

      <div class="actions">
        <button id="confirmGroup" class="confirmButton">Confirm</button>
        <button id="cancelGroup" class="cancelButton">Cancel</button>
      </div>
    </div>

    <div id="other-users"></div>
  </section>

  <section id="all-users">
    <user-interaction-panel id="userInteract" style="display: block"></user-interaction-panel>
  </section>

  <script src="sidebar.js" type="module"></script>
</body>
</html>
